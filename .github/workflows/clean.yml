name: Cleanup Old Images
on:
  schedule:
    - cron: "15 0 * * 0" # 00:15 UTC по Воскресеньям
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}

permissions: {}

jobs:
  delete-older-than-90:
    name: Cleanup
    runs-on: ubuntu-latest
    permissions:
      packages: write # требуется для настройки прав доступа к репозиторию
    steps:
      - name: Delete Images Older Than 90 Days
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          packages: hyprland,hyprland-nvidia,labwc,labwc-nvidia,niri,niri-nvidia,river,river-nvidia,sway,sway-nvidia
          older-than: 90 days
          delete-orphaned-images: true
          keep-n-tagged: 7
          keep-n-untagged: 7